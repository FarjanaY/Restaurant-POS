name = "restaurant-pos"
main = "worker.js"
compatibility_date = "2025-01-01"

# Pure static site — the Vite build output. SPA fallback (serving
# index.html for unmatched client-side routes like /admin, /kds) is
# handled manually in worker.js rather than via `not_found_handling`,
# since that declarative option has open false-positive bugs in its
# _redirects-style validation (cloudflare/workers-sdk#10992, #11824).
[assets]
directory = "./dist"
binding = "ASSETS"
